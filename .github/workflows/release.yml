name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release (curl, no gh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # Tags containing '-' are pre-releases (v0.1.0-dev.1, -beta.1, -rc.1).
          if echo "$tag" | grep -q '-'; then prerelease=true; else prerelease=false; fi
          curl -fSs -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\":\"${tag}\",\"name\":\"${tag}\",\"prerelease\":${prerelease},\"generate_release_notes\":true}"
