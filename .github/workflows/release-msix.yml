# Build + sign the loop-slice client and server MSIX packages via packaging/build_msix.exs.
# That Elixir script downloads the merged "double" editor + Windows template from
# v-sekai-multiplayer-fabric/godot-images, exports both Windows builds, and packs+signs the MSIX
# with packaging/msix/pack.ps1 + packaging/msix-server/pack-server.ps1 (Windows SDK).
#
# Set secrets LOOP_PFX_BASE64 + LOOP_PFX_PASSWORD for a trusted cert; without them the build
# self-signs a TEST cert (installable only after trusting it).
#
# NB: the godot-images "latest" tag currently ships an INCOMPLETE windows-editor.zip (driver
# DLLs only, no Godot binary). Use a 6-asset release such as 0.1.0-dev.8, which carries the real
# Windows editor + template. That is the default below and the script's built-in default.
name: Release MSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Four-part package version (e.g. 0.1.0.1 for dev, 0.1.0.0 for release)"
        required: true
        default: "0.1.0.1"
      godot_images_tag:
        description: godot-images release tag providing the merged editor + double templates
        required: true
        default: "0.1.0-dev.8"
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Resolve version + godot-images tag
        id: inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            semver="${tag#v}"
            core="${semver%%-*}"
            pre="${semver#${core}}"
            build_n="${pre##*.}"
            [ -z "$pre" ] && build_n=0
            version="${core}.${build_n}"
            godot_tag="0.1.0-dev.8"   # pin to a complete godot-images release
          else
            version="${{ github.event.inputs.version }}"
            godot_tag="${{ github.event.inputs.godot_images_tag }}"
          fi
          echo "version=$version"   >> "$GITHUB_OUTPUT"
          echo "godot_tag=$godot_tag" >> "$GITHUB_OUTPUT"

      - name: Decode signing cert (optional)
        id: cert
        shell: pwsh
        env:
          LOOP_PFX_BASE64: ${{ secrets.LOOP_PFX_BASE64 }}
        run: |
          if ($env:LOOP_PFX_BASE64) {
            $p = "$env:RUNNER_TEMP\loop.pfx"
            [IO.File]::WriteAllBytes($p, [Convert]::FromBase64String($env:LOOP_PFX_BASE64))
            "pfx=$p" >> $env:GITHUB_OUTPUT
          }

      - name: Build + sign client & server MSIX
        shell: pwsh
        run: |
          $pfx = @()
          if ("${{ steps.cert.outputs.pfx }}") {
            $pfx = @("--pfx", "${{ steps.cert.outputs.pfx }}", "--pfx-pass", "${{ secrets.LOOP_PFX_PASSWORD }}")
          }
          $stage = "$env:RUNNER_TEMP\msix"
          elixir packaging/build_msix.exs --tag "${{ steps.inputs.outputs.godot_tag }}" --version "${{ steps.inputs.outputs.version }}" --stage "$stage" @pfx
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "$stage\project\dist\*.msix" dist/
          Get-ChildItem dist

      - uses: actions/upload-artifact@v5
        with:
          name: loop-slice-msix
          path: dist/*.msix

      - name: Upload MSIX to the GitHub Release (curl, no gh)
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          auth=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")
          # release.yml creates the release on the same tag push; resolve its id
          rel_id=$(curl -fSs "${auth[@]}" "https://api.github.com/repos/$repo/releases/tags/$tag" \
                   | python -c 'import sys,json; print(json.load(sys.stdin)["id"])')
          for f in dist/*.msix; do
            name=$(basename "$f")
            # clobber: drop any existing asset with the same name first
            old=$(curl -fSs "${auth[@]}" "https://api.github.com/repos/$repo/releases/$rel_id/assets" \
                  | python -c "import sys,json; print(next((a['id'] for a in json.load(sys.stdin) if a['name']=='$name'),''))")
            [ -n "$old" ] && curl -fSs -X DELETE "${auth[@]}" "https://api.github.com/repos/$repo/releases/assets/$old"
            echo "uploading $name -> release $rel_id"
            curl -fSs -X POST "${auth[@]}" -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" \
              "https://uploads.github.com/repos/$repo/releases/$rel_id/assets?name=$name"
          done
