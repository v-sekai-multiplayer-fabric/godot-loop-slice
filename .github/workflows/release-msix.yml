# Build and sign the loop-slice client and server MSIX packages.
# Set secrets LOOP_PFX_BASE64 + LOOP_PFX_PASSWORD for a trusted cert;
# without them both jobs self-sign a TEST cert (installable only after trusting it).
# The editor + double Windows template come from v-sekai-multiplayer-fabric/godot-images.
#
# On push: tags v* the version is derived from the git tag and the latest
# godot-images release is used automatically. MSIX assets are uploaded to
# the GitHub Release created by release.yml.
name: Release MSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Four-part package version (e.g. 0.1.0.1 for dev, 0.1.0.0 for release)"
        required: true
        default: "0.1.0.1"
      godot_images_tag:
        description: godot-images release tag providing the merged editor + double templates
        required: true
      editor_asset:
        description: Windows editor zip asset name in that release
        required: true
        default: windows-editor.zip
      windows_template_asset:
        description: Windows double export template zip asset name
        required: true
        default: windows-template-release.zip
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.inputs.outputs.version }}
      godot_tag: ${{ steps.inputs.outputs.godot_tag }}
      editor_asset: ${{ steps.inputs.outputs.editor_asset }}
      windows_template_asset: ${{ steps.inputs.outputs.windows_template_asset }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve inputs
        id: inputs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            semver="${tag#v}"
            core="${semver%%-*}"
            pre="${semver#${core}}"
            build_n="${pre##*.}"
            [ -z "$pre" ] && build_n=0
            version="${core}.${build_n}"
            godot_tag=$(gh release list -R v-sekai-multiplayer-fabric/godot-images \
              --limit 1 --json tagName -q '.[0].tagName')
            editor_asset="windows-editor.zip"
            windows_template_asset="windows-template-release.zip"
          else
            version="${{ github.event.inputs.version }}"
            godot_tag="${{ github.event.inputs.godot_images_tag }}"
            editor_asset="${{ github.event.inputs.editor_asset }}"
            windows_template_asset="${{ github.event.inputs.windows_template_asset }}"
          fi
          echo "version=$version"              >> "$GITHUB_OUTPUT"
          echo "godot_tag=$godot_tag"          >> "$GITHUB_OUTPUT"
          echo "editor_asset=$editor_asset"    >> "$GITHUB_OUTPUT"
          echo "windows_template_asset=$windows_template_asset" >> "$GITHUB_OUTPUT"

      - name: Fetch merged editor + Windows template from godot-images
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # godot-images ships each platform's build as a zip of the editors/
          # (editor target) and tpz/ (template target) trees, not a bare .exe.
          # Download both zips and unpack them; the export step locates the
          # actual godot.windows.*.exe inside.
          mkdir -p tools templates
          gh release download "${{ steps.inputs.outputs.godot_tag }}" \
            -R v-sekai-multiplayer-fabric/godot-images \
            -p "${{ steps.inputs.outputs.editor_asset }}" -D tools
          gh release download "${{ steps.inputs.outputs.godot_tag }}" \
            -R v-sekai-multiplayer-fabric/godot-images \
            -p "${{ steps.inputs.outputs.windows_template_asset }}" -D templates
          unzip -q "tools/${{ steps.inputs.outputs.editor_asset }}" -d tools
          unzip -q "templates/${{ steps.inputs.outputs.windows_template_asset }}" -d templates

      - name: Export Windows client build
        shell: bash
        run: |
          set -euo pipefail
          # Locate the editor + template_release exe inside the unpacked zips
          # (editors/ from the editor zip, tpz/ from the template zip). Exclude
          # the .console.exe console wrapper.
          GODOT=$(find tools -type f -name 'godot.windows.editor*.x86_64.exe' \
            ! -name '*.console.exe' -print -quit)
          tmpl=$(find templates -type f -name 'godot.windows.template_release*.x86_64.exe' \
            ! -name '*.console.exe' -print -quit)
          if [ -z "$GODOT" ] || [ -z "$tmpl" ]; then
            echo "::error::missing engine binaries — editor='$GODOT' template='$tmpl'"
            echo "tools tree:"; find tools -name '*.exe'; echo "templates tree:"; find templates -name '*.exe'
            exit 1
          fi
          GODOT="$GITHUB_WORKSPACE/$GODOT"
          tmpl="$GITHUB_WORKSPACE/$tmpl"
          echo "editor=$GODOT"; echo "template=$tmpl"
          sed -i "s|custom_template/release=.*|custom_template/release=\"$tmpl\"|" export_presets.cfg
          mkdir -p build/windows
          "$GODOT" --headless --import . || true
          "$GODOT" --headless --export-release "Windows Desktop" build/windows/loop-slice.exe
          ls -la build/windows

      - name: Upload client build
        uses: actions/upload-artifact@v5
        with:
          name: windows-client-build
          path: build/windows/

      - name: Export Windows Dedicated Server build
        shell: bash
        run: |
          set -euo pipefail
          # export_presets.cfg already had custom_template/release rewritten to
          # the unpacked template by the client export step above.
          GODOT=$(find tools -type f -name 'godot.windows.editor*.x86_64.exe' \
            ! -name '*.console.exe' -print -quit)
          GODOT="$GITHUB_WORKSPACE/$GODOT"
          mkdir -p build/windows-server
          "$GODOT" --headless --export-release "Windows Dedicated Server" \
            build/windows-server/loop-slice-server.exe
          ls -la build/windows-server

      - name: Upload server build
        uses: actions/upload-artifact@v5
        with:
          name: windows-server-build
          path: build/windows-server/

  msix-client:
    needs: build-windows
    runs-on: windows-latest
    env:
      LOOP_PFX_BASE64: ${{ secrets.LOOP_PFX_BASE64 }}
    steps:
      - uses: actions/checkout@v5

      - name: Download client build
        uses: actions/download-artifact@v5
        with:
          name: windows-client-build
          path: build/windows

      - name: Import signing cert
        if: ${{ env.LOOP_PFX_BASE64 != '' }}
        shell: bash
        run: echo "$LOOP_PFX_BASE64" | base64 -d > loop.pfx

      - name: Pack + sign client MSIX
        shell: pwsh
        run: |
          $pfx = if (Test-Path loop.pfx) { @("-PfxPath","loop.pfx","-PfxPassword","${{ secrets.LOOP_PFX_PASSWORD }}") } else { @() }
          pwsh packaging/msix/pack.ps1 -BinDir build/windows -Version "${{ needs.build-windows.outputs.version }}" -OutDir dist @pfx

      - uses: actions/upload-artifact@v5
        with:
          name: loop-slice-msix
          path: dist/v-sekai-loop-slice-*.msix

      - name: Upload client MSIX to GitHub Release
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" dist/v-sekai-loop-slice-*.msix --clobber

  msix-server:
    needs: build-windows
    runs-on: windows-latest
    env:
      LOOP_PFX_BASE64: ${{ secrets.LOOP_PFX_BASE64 }}
    steps:
      - uses: actions/checkout@v5

      - name: Download server build
        uses: actions/download-artifact@v5
        with:
          name: windows-server-build
          path: build/windows-server

      - name: Import signing cert
        if: ${{ env.LOOP_PFX_BASE64 != '' }}
        shell: bash
        run: echo "$LOOP_PFX_BASE64" | base64 -d > loop.pfx

      - name: Pack + sign server MSIX
        shell: pwsh
        run: |
          $pfx = if (Test-Path loop.pfx) { @("-PfxPath","loop.pfx","-PfxPassword","${{ secrets.LOOP_PFX_PASSWORD }}") } else { @() }
          pwsh packaging/msix-server/pack-server.ps1 -BinDir build/windows-server -Version "${{ needs.build-windows.outputs.version }}" -OutDir dist @pfx

      - uses: actions/upload-artifact@v5
        with:
          name: loop-slice-server-msix
          path: dist/v-sekai-loop-slice-server-*.msix

      - name: Upload server MSIX to GitHub Release
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" dist/v-sekai-loop-slice-server-*.msix --clobber
