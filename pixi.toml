# Bootstrap layer so the MSIX build runs on a bare Windows / Linux / macOS:
# install the single pixi binary, then `pixi run build-msix`. Pixi provisions a
# pinned Python; the script itself is stdlib-only and also runs under any plain
# `python3 packaging/build_msix.py`.
#
# Pixi provides the *runtime*. It cannot provide the Windows SDK (makeappx /
# signtool) or the custom Godot "double" editor -- so the MSIX pack/sign stage
# still only completes on Windows or WSL. See packaging/build_msix.py.
[project]
name = "loop-slice-msix"
description = "Build the loop-slice client + server MSIX packages"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.11"

[tasks]
build-msix = "python packaging/build_msix.py"
